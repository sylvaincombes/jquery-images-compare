<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>QUnit Example</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
        }

        #qunit {
            margin: 20px;
        }

        body #qunit,
        body #qunit-fixture {
            position: static;
            float: none;
            clear: both;
        }

        body #qunit-testrunner-toolbar,
        body #qunit-testresult,
        body #qunit-tests {
            position: static;
        }

        .test-main {
            padding: 20px;
        }

        .test-jump {
            display: inline-block;
            margin: 0 0 12px;
            padding: 10px 16px;
            background: #1f6feb;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .test-jump:hover,
        .test-jump:focus {
            background: #1a5fd0;
            color: #ffffff;
        }

        .test-checkerboard {
            background-color: #f0f0f0;
            background-image:
                linear-gradient(45deg, #d9d9d9 25%, transparent 25%),
                linear-gradient(-45deg, #d9d9d9 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #d9d9d9 75%),
                linear-gradient(-45deg, transparent 75%, #d9d9d9 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0;
            padding: 0;
            display: inline-block;
        }
    </style>
    <link rel="stylesheet" href="/examples/assets/css/example.css"/>
    <link rel="stylesheet" href="/src/assets/css/images-compare.css"/>
    <link rel="stylesheet" href="https://code.jquery.com/qunit/qunit-2.25.0.css" integrity="sha256-u09P9nfJ159U3nzs4JTe+R+CnykeROFWAqyz8AW0j5w=" crossorigin="anonymous">
</head>
<body>
<main class="test-main">
    <a class="test-jump" href="#qunit">Jump to QUnit results</a>
    <div class="page-container">
        <h1>jQuery Image compare</h1>
        <h2>Example</h2>

        <!-- Test 1 -->
        <div class="js-img-compare">
            <div style="display: none;">
                <span class="images-compare-label">Before</span>
                <img src="/examples/assets/img/01-celine-skowron-before.jpg" alt="Before">
            </div>
            <div>
                <span class="images-compare-label">After</span>
                <img src="/examples/assets/img/01-celine-skowron-after.jpg" alt="After">
            </div>
        </div>
        <div>
            <button type="button" class="btn js-front-btn">Show front image</button>
            <button type="button" class="btn js-back-btn">Show back image</button>
            <button type="button" class="btn js-toggle-btn">Toggle</button>
        </div>

        <h2>Click mode</h2>
        <div class="js-img-compare-click">
            <div style="display: none;">
                <span class="images-compare-label">Before</span>
                <img src="/examples/assets/img/01-celine-skowron-before.jpg" alt="Before">
            </div>
            <div>
                <span class="images-compare-label">After</span>
                <img src="/examples/assets/img/01-celine-skowron-after.jpg" alt="After">
            </div>
        </div>

        <h2>Mousemove mode (desktop)</h2>
        <div class="js-img-compare-move">
            <div style="display: none;">
                <span class="images-compare-label">Before</span>
                <img src="/examples/assets/img/01-celine-skowron-before.jpg" alt="Before">
            </div>
            <div>
                <span class="images-compare-label">After</span>
                <img src="/examples/assets/img/01-celine-skowron-after.jpg" alt="After">
            </div>
        </div>

        <footer>
            Image credits : <a href="https://celine-skowron.fr">Céline Skowron</a>
        </footer>

    </div>

<div id="qunit-fixture"></div>

<script src="https://code.jquery.com/qunit/qunit-2.25.0.js" integrity="sha256-0ijVPNkjDIdvOeV6a9B7VtQn/9cSj9k8SjwGgiJ/4jQ=" crossorigin="anonymous"></script>
<script type="text/javascript" src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
<script type="text/javascript" src="/src/assets/js/jquery.images-compare.js"></script>
<script type="text/javascript" src="/examples/assets/js/images-compare-controls.js"></script>
<script type="text/javascript">
    $(() => {
        var imagesCompareElement = $('.js-img-compare').imagesCompare();
        $('.js-img-compare-click').imagesCompare({ interactionMode: "click" });
        $('.js-img-compare-move').imagesCompare({ interactionMode: "mousemove" });
        $('.js-img-compare-transparent-png').imagesCompare();
        $('.js-img-compare-transparent-gif').imagesCompare();
        $('.js-img-compare-transparent-webp').imagesCompare();
        $('.js-img-compare-transparent-avif').imagesCompare();
        $('.js-img-compare-transparent-svg').imagesCompare();
        var imagesCompare = imagesCompareElement.data('imagesCompare');
        var events = imagesCompare.events();

        // CHANGE EVENT TESTS AND
        // GETTER SETTER TESTS
        function testElementChangeEvent(event) {
            QUnit.test("test change event listener", (assert) => {
                assert.equal(event.ratio, 1, 'Change event received and value equal 1');
            });
        }

        function testChangeEvent(event) {
            QUnit.test("test change event listener", (assert) => {
                assert.equal(event.ratio, 0, 'Change event received and value equal 0');
            });
        }

        // Async tests
        QUnit.test("Change event tests and getter setter tests", (assert) => {
            var numCalls = 3;
            assert.expect(numCalls);
            var done = assert.async(numCalls);

            // change value 1 and listen to element
            setTimeout(() => {
                imagesCompareElement.on(events.changed, testElementChangeEvent);
                imagesCompare.setValue(1);
                assert.equal(imagesCompare.getValue(), 1, "test get and set value from outside : Changed value success (1)");
                done();
            }, 60);

            // change value 0 and listen to "data" object
            setTimeout(() => {
                imagesCompareElement.off(events.changed, testElementChangeEvent);
                imagesCompare.on(events.changed, testChangeEvent);
                imagesCompare.setValue(0);
                assert.equal(imagesCompare.getValue(), 0, "test get and set value from outside : Changed value success (0)");
                done();
            }, 120);

            setTimeout(() => {
                assert.ok(true, 'test get and set value from outside and event completed');
                imagesCompare.off(events.changed, testChangeEvent);
                done();
            }, 180);
        });

        // RESIZE EVENT TEST
        function testResizeEvent(_event) {
            QUnit.test("test resize event", (assert) => {
                assert.ok(true, 'Resize event received');
            });
        }

        imagesCompareElement.on(events.resized, testResizeEvent);
        $(window).trigger('resize');
        imagesCompareElement.off(events.resized, testResizeEvent);

        imagesCompare.on(events.resized, testResizeEvent);
        $(window).trigger('resize');
        imagesCompare.off(events.resized, testResizeEvent);
        window.imagesCompareBindControls(imagesCompare);

        QUnit.test("Init without images", (assert) => {
            const done = assert.async();
            const fixture = $("#qunit-fixture");
            fixture.empty();

            const container = $(
                '<div class="js-img-compare-noimg">' +
                    '<div><span>No image</span></div>' +
                    '<div><span>No image</span></div>' +
                '</div>'
            );

            let initCalled = false;
            container.on("imagesCompare:initialised", () => {
                initCalled = true;
            });

            fixture.append(container);
            container.imagesCompare();

            setTimeout(() => {
                assert.ok(initCalled, "Initialised event fires even with no images");
                done();
            }, 0);
        });

        QUnit.test("Drag fallback without PointerEvent", (assert) => {
            const done = assert.async();
            const fixture = $("#qunit-fixture");
            fixture.empty();

            const previousPointerEvent = window.PointerEvent;
            window.PointerEvent = undefined;

            const dataImage = "data:image/gif;base64,R0lGODlhAQABAAAAACw=";
            const container = $(
                '<div class="js-img-compare-fallback" style="width: 200px;">' +
                    '<div><img src="' + dataImage + '" width="200" height="100" alt="Before"></div>' +
                    '<div><img src="' + dataImage + '" width="200" height="100" alt="After"></div>' +
                '</div>'
            );

            container.on("imagesCompare:initialised", () => {
                const offset = container.offset();
                const targetX = offset.left + 100;
                container.trigger($.Event("mousedown", { pageX: targetX, button: 0 }));
                $(window).trigger($.Event("mousemove", { pageX: targetX }));

                const imagesCompare = container.data("imagesCompare");
                const ratio = imagesCompare.getValue();

                window.PointerEvent = previousPointerEvent;
                assert.ok(ratio > 0.4 && ratio < 0.6, "Mouse fallback updates ratio");
                done();
            });

            fixture.append(container);
            container.imagesCompare();
        });

        QUnit.test("Transparent formats initialize", (assert) => {
            const selectors = [
                ".js-img-compare-transparent-png",
                ".js-img-compare-transparent-gif",
                ".js-img-compare-transparent-webp",
                ".js-img-compare-transparent-avif",
                ".js-img-compare-transparent-svg",
            ];

            selectors.forEach((selector) => {
                const instance = $(selector).data("imagesCompare");
                assert.ok(instance, `${selector} initialized`);
            });
        });
    });
</script>
